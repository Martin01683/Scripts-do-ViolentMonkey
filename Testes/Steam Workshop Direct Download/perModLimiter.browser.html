<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>SWDD PerModRequestLimiter Test</title>
</head>
<body>
<script>
'use strict';

// =========================================================================
// Cópia fiel do PerModRequestLimiter do script principal (MÓDULO 0.2).
// Qualquer mudança no módulo 0.2 do script principal deve ser replicada aqui.
//
// DEFAULT_CONCURRENT = 3 (em vez de 10 do script principal) para que os
// testes de FIFO e de prioridade precisem enfileirar tarefas de verdade —
// com 10 slots a maioria das tarefas iniciaria imediatamente sem enfileirar.
// As asserções de peakRunning usam toBeLessThanOrEqual(MAX_CONCURRENT = 10),
// portanto um pico máximo de 3 ainda satisfaz todas as checagens de limite.
// =========================================================================
const mirrorConcurrency = {}; // stub: sem configuração salva nos testes
const DEFAULT_CONCURRENT = 3; // valor reduzido para forçar enfileiramento

const PerModRequestLimiter = (() => {
    const limiters = {};

    function createLimiter(mirrorId) {
        let running = 0;
        // Array mantido em ordem DECRESCENTE de prioridade; FIFO dentro da mesma.
        const queue = [];

        function drain() {
            const max = (mirrorConcurrency[mirrorId] != null ? mirrorConcurrency[mirrorId] : DEFAULT_CONCURRENT);
            while (running < max && queue.length > 0) {
                const { task, resolve, reject } = queue.shift();
                running++;
                task()
                    .then(resolve, reject)
                    .finally(() => { running--; drain(); });
            }
        }

        return {
            /**
             * Enfileira uma tarefa com prioridade opcional.
             * Maior prioridade → despachado antes. FIFO para prioridades iguais.
             */
            run(task, priority = 0) {
                return new Promise((resolve, reject) => {
                    const item = { task, resolve, reject, priority };
                    let lo = 0, hi = queue.length;
                    while (lo < hi) {
                        const mid = (lo + hi) >> 1;
                        if (queue[mid].priority >= priority) lo = mid + 1;
                        else hi = mid;
                    }
                    queue.splice(lo, 0, item);
                    drain();
                });
            },
            drain,
            _getRunning() { return running; },
            _getQueueLength() { return queue.length; }
        };
    }

    return {
        forMirror(mirrorId) {
            if (!limiters[mirrorId]) limiters[mirrorId] = createLimiter(mirrorId);
            return limiters[mirrorId];
        }
    };
})();

// =========================================================================
// Helpers de teste
// =========================================================================

/** Simula uma requisição de rede com duração controlada. */
function fakeRequest(durationMs) {
    return new Promise(resolve => setTimeout(resolve, durationMs));
}

/**
 * Roda `count` tarefas simultâneas através do limiter do mirror especificado,
 * cada uma durando `taskDurationMs`.
 * Rastreia o pico de concorrência e a ordem de conclusão.
 */
async function runConcurrent({ mirrorId, count, taskDurationMs = 50 }) {
    const limiter = PerModRequestLimiter.forMirror(mirrorId);
    let peakRunning = 0;
    let currentRunning = 0;
    const completionOrder = [];

    const tasks = Array.from({ length: count }, (_, i) =>
        limiter.run(async () => {
            currentRunning++;
            if (currentRunning > peakRunning) peakRunning = currentRunning;
            await fakeRequest(taskDurationMs);
            completionOrder.push(i);
            currentRunning--;
        })
    );

    await Promise.all(tasks);
    return { peakRunning, completionOrder };
}

// =========================================================================
// API pública para os testes Playwright
// =========================================================================
window.__limiterTest__ = {
    /**
     * Limite de concorrência usado nos helpers abaixo para bloquear TODOS os slots.
     * Deve coincidir com DEFAULT_CONCURRENT acima para que os bloqueadores saturem
     * a fila e forcem enfileiramento real nos testes de FIFO e prioridade.
     */
    MAX_CONCURRENT: DEFAULT_CONCURRENT,

    /** Pico de concorrência ao rodar N tarefas simultâneas no mesmo mirror. */
    runConcurrent,

    /** Estado interno do limiter de um mirror (para inspeção). */
    getLimiterState(mirrorId) {
        const l = PerModRequestLimiter.forMirror(mirrorId);
        return { running: l._getRunning(), queued: l._getQueueLength() };
    },

    /**
     * Verifica que mirrors distintos NÃO compartilham slots:
     * mirror A ocupado não bloqueia mirror B.
     */
    async mirrorsAreIndependent({ mirrorA, mirrorB, taskDurationMs = 80 }) {
        const limiterA = PerModRequestLimiter.forMirror(mirrorA);
        const limiterB = PerModRequestLimiter.forMirror(mirrorB);

        // Ocupa TODOS os slots do mirror A com tarefas longas
        const blockersA = Array.from({ length: DEFAULT_CONCURRENT }, () =>
            limiterA.run(() => fakeRequest(taskDurationMs))
        );

        // Tenta rodar imediatamente no mirror B — deve começar sem esperar A
        const startB = Date.now();
        await limiterB.run(() => fakeRequest(10));
        const elapsed = Date.now() - startB;

        await Promise.all(blockersA);
        return { elapsed }; // se < taskDurationMs, B não esperou A
    },

    /**
     * Verifica a ordem FIFO: tarefas enfileiradas (mesma prioridade = 0) devem
     * ser despachadas na ordem em que foram submetidas.
     * Bloqueia TODOS os slots para forçar enfileiramento real.
     */
    async checkFifoOrder({ mirrorId, extraTasks = 4 }) {
        const limiter = PerModRequestLimiter.forMirror(mirrorId);

        // Bloqueia TODOS os slots com tarefas longas para forçar enfileiramento
        const blockers = Array.from({ length: DEFAULT_CONCURRENT }, () =>
            limiter.run(() => fakeRequest(100))
        );

        // Enfileira tarefas adicionais com prioridade padrão (0) — devem sair em FIFO
        const order = [];
        const enqueued = Array.from({ length: extraTasks }, (_, i) =>
            limiter.run(async () => { order.push(i); })
        );

        await Promise.all([...blockers, ...enqueued]);
        return { order };
    },

    /**
     * Verifica que itens de MAIOR prioridade são despachados ANTES de itens
     * de menor prioridade, independentemente da ordem de inserção na fila.
     *
     * Cenário de scroll inteligente (equivalente a rolar a página para baixo):
     *   1. Todos os slots estão ocupados com tarefas em andamento (simulando mods
     *      do topo da página já em verificação).
     *   2. Dois novos itens são enfileirados: primeiro o de baixa prioridade (0),
     *      depois o de alta prioridade (1) — representando o mod que acabou de
     *      aparecer na tela do usuário.
     *   3. Ao liberar um slot, o de alta prioridade deve rodar ANTES do baixo.
     */
    async checkPriorityOrder({ mirrorId = 'priority_mirror' }) {
        const limiter = PerModRequestLimiter.forMirror(mirrorId);

        // Controle manual dos blockers: usamos resolvers externos para liberá-los
        // um a um de forma determinística.
        const blockerResolvers = [];
        const blockers = Array.from({ length: DEFAULT_CONCURRENT }, () =>
            limiter.run(() => new Promise(res => blockerResolvers.push(res)))
        );

        // Garante que os blockers estão todos rodando (slots cheios) antes de enfileirar
        await new Promise(res => setTimeout(res, 0));

        // Enfileira: PRIMEIRO o de baixa prioridade, DEPOIS o de alta prioridade.
        // Com prioridade ignorada (FIFO puro), sairia ['low', 'high'].
        // Com prioridade correta, deve sair ['high', 'low'].
        const order = [];
        const lowTask  = limiter.run(async () => { order.push('low');  }, 0);
        const highTask = limiter.run(async () => { order.push('high'); }, 1);

        // Libera um slot → deve escolher 'high' (priority=1)
        blockerResolvers[0]();
        await highTask;

        // Libera restante → roda 'low' + termina blockers
        for (let i = 1; i < blockerResolvers.length; i++) blockerResolvers[i]();
        await Promise.all([lowTask, ...blockers]);

        return { order };
    },

    /**
     * Verifica que FIFO é preservado DENTRO de itens com a MESMA prioridade.
     * Insere vários itens com priority=1; todos devem sair em ordem de inserção.
     */
    async checkFifoWithinSamePriority({ mirrorId = 'fifo_priority_mirror', count = 4 }) {
        const limiter = PerModRequestLimiter.forMirror(mirrorId);

        // Bloqueia todos os slots
        const blockerResolvers = [];
        const blockers = Array.from({ length: DEFAULT_CONCURRENT }, () =>
            limiter.run(() => new Promise(res => blockerResolvers.push(res)))
        );

        await new Promise(res => setTimeout(res, 0));

        // Enfileira 'count' itens com priority=1 em sequência
        const order = [];
        const tasks = Array.from({ length: count }, (_, i) =>
            limiter.run(async () => { order.push(i); }, 1)
        );

        // Libera todos os blockers e aguarda conclusão
        blockerResolvers.forEach(res => res());
        await Promise.all([...blockers, ...tasks]);

        return { order };
    },

    /**
     * Verifica o cenário completo de scroll: prioridades mistas na fila.
     * Mistura itens de priority=0 e priority=1; os de priority=1 devem vir primeiro.
     */
    async checkMixedPriorityOrder({ mirrorId = 'mixed_priority_mirror' }) {
        const limiter = PerModRequestLimiter.forMirror(mirrorId);

        const blockerResolvers = [];
        const blockers = Array.from({ length: DEFAULT_CONCURRENT }, () =>
            limiter.run(() => new Promise(res => blockerResolvers.push(res)))
        );

        await new Promise(res => setTimeout(res, 0));

        // Enfileira: baixo, alto, baixo, alto — resultado esperado: alto, alto, baixo, baixo
        const order = [];
        const t1 = limiter.run(async () => { order.push('low-1');  }, 0);
        const t2 = limiter.run(async () => { order.push('high-1'); }, 1);
        const t3 = limiter.run(async () => { order.push('low-2');  }, 0);
        const t4 = limiter.run(async () => { order.push('high-2'); }, 1);

        blockerResolvers.forEach(res => res());
        await Promise.all([...blockers, t1, t2, t3, t4]);

        return { order };
    },

    fakeRequest
};

const MAX_CONCURRENT = window.__limiterTest__.MAX_CONCURRENT;
window.__testReady__ = true;
</script>
</body>
</html>
