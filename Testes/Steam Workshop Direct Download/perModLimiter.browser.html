<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>SWDD PerModRequestLimiter Test</title>
</head>
<body>
<script>
'use strict';

// =========================================================================
// Cópia exata do PerModRequestLimiter do script principal.
// Qualquer mudança no módulo 0.2 do script principal deve ser replicada aqui.
// =========================================================================
const PerModRequestLimiter = (() => {
    const MAX_CONCURRENT = 10;
    const limiters = {};

    function createLimiter() {
        let running = 0;
        const queue = [];

        function drain() {
            while (running < MAX_CONCURRENT && queue.length > 0) {
                const { task, resolve, reject } = queue.shift();
                running++;
                task()
                    .then(resolve, reject)
                    .finally(() => { running--; drain(); });
            }
        }

        return {
            run(task) {
                return new Promise((resolve, reject) => {
                    queue.push({ task, resolve, reject });
                    drain();
                });
            },
            _getRunning() { return running; },
            _getQueueLength() { return queue.length; }
        };
    }

    return {
        forMirror(mirrorId) {
            if (!limiters[mirrorId]) limiters[mirrorId] = createLimiter();
            return limiters[mirrorId];
        }
    };
})();

// =========================================================================
// Helpers de teste
// =========================================================================

/**
 * Simula uma requisição de rede com duração controlada.
 * Retorna uma Promise que resolve após `durationMs`.
 */
function fakeRequest(durationMs) {
    return new Promise(resolve => setTimeout(resolve, durationMs));
}

/**
 * Roda `count` tarefas simultâneas através do limiter do mirror especificado,
 * cada uma durando `taskDurationMs`.
 * Rastreia o pico de concorrência e a ordem de conclusão.
 */
async function runConcurrent({ mirrorId, count, taskDurationMs = 50 }) {
    const limiter = PerModRequestLimiter.forMirror(mirrorId);
    let peakRunning = 0;
    let currentRunning = 0;
    const completionOrder = [];

    const tasks = Array.from({ length: count }, (_, i) =>
        limiter.run(async () => {
            currentRunning++;
            if (currentRunning > peakRunning) peakRunning = currentRunning;
            await fakeRequest(taskDurationMs);
            completionOrder.push(i);
            currentRunning--;
        })
    );

    await Promise.all(tasks);
    return { peakRunning, completionOrder };
}

// =========================================================================
// API pública para os testes Playwright
// =========================================================================
window.__limiterTest__ = {
    MAX_CONCURRENT: 2,

    /** Pico de concorrência ao rodar N tarefas simultâneas no mesmo mirror. */
    runConcurrent,

    /** Estado interno do limiter de um mirror (para inspeção). */
    getLimiterState(mirrorId) {
        const l = PerModRequestLimiter.forMirror(mirrorId);
        return { running: l._getRunning(), queued: l._getQueueLength() };
    },

    /**
     * Verifica que mirrors distintos NÃO compartilham slots:
     * mirror A ocupado não bloqueia mirror B.
     */
    async mirrorsAreIndependent({ mirrorA, mirrorB, taskDurationMs = 80 }) {
        const completions = [];
        const limiterA = PerModRequestLimiter.forMirror(mirrorA);
        const limiterB = PerModRequestLimiter.forMirror(mirrorB);

        // Ocupa todos os slots do mirror A com tarefas longas
        const blockersA = Array.from({ length: MAX_CONCURRENT }, () =>
            limiterA.run(() => fakeRequest(taskDurationMs))
        );

        // Tenta rodar imediatamente no mirror B — deve começar sem esperar A
        const startB = Date.now();
        await limiterB.run(() => fakeRequest(10));
        const elapsed = Date.now() - startB;

        await Promise.all(blockersA);
        return { elapsed }; // se < taskDurationMs, B não esperou A
    },

    /**
     * Verifica a ordem FIFO: tarefas enfileiradas devem ser despachadas
     * na ordem em que foram submetidas.
     */
    async checkFifoOrder({ mirrorId, extraTasks = 4 }) {
        const limiter = PerModRequestLimiter.forMirror(mirrorId);

        // Bloqueia os slots com tarefas longas
        const blockers = Array.from({ length: MAX_CONCURRENT }, () =>
            limiter.run(() => fakeRequest(100))
        );

        // Enfileira tarefas adicionais
        const order = [];
        const enqueued = Array.from({ length: extraTasks }, (_, i) =>
            limiter.run(async () => { order.push(i); })
        );

        await Promise.all([...blockers, ...enqueued]);
        return { order };
    },

    fakeRequest
};

const MAX_CONCURRENT = window.__limiterTest__.MAX_CONCURRENT;
window.__testReady__ = true;
</script>
</body>
</html>
